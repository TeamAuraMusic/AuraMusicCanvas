name: Add New Canvases (Paxsenix)

on:
  workflow_dispatch:   # Manual trigger
  schedule:
    # Runs every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'

permissions:
  contents: write

jobs:
  add-canvases:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --omit=dev || npm install --omit=dev

      - name: Run auto-add script with Paxsenix
        env:
          PAXSENIX_API_KEY: ${{ secrets.PAXSENIX_API_KEY }}
          PROVIDER: paxsenix
        run: |
          if [ -f "tracks-to-fetch.txt" ]; then
            node scripts/auto-add-canvases.js --input tracks-to-fetch.txt --provider paxsenix --auto-import
          else
            echo "No tracks-to-fetch.txt found. Skipping."
            echo "Create a tracks-to-fetch.txt file with Spotify track IDs (one per line) to enable automation."
            exit 0
          fi

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet public/canvas.json; then
            echo "No changes to commit."
          else
            git add public/canvas.json
            git commit -m "chore: auto-add new canvases via Paxsenix (scheduled/manual)"
            git push origin main
            echo "✅ New canvases added and pushed."
          fi
